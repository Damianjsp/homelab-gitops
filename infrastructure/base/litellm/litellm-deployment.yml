apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: litellm
  labels:
    app: litellm-proxy
    version: 1.2.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: litellm-proxy
        version: 1.2.1
    spec:
      imagePullSecrets:
      - name: acr-secret
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: litellm
        image: dahomelab.azurecr.io/litellm-proxy:1.2.1
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
          protocol: TCP
        env:
        - name: AZURE_ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: AZURE_ANTHROPIC_API_KEY
        - name: AZURE_EUROPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: AZURE_EUROPE_API_KEY
        - name: AZURE_AMERICA_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: AZURE_AMERICA_API_KEY
        - name: AZURE_SGF_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: AZURE_SGF_API_KEY
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: LITELLM_MASTER_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: DATABASE_URL
        - name: LITELLM_SALT_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: LITELLM_SALT_KEY
        - name: LITELLM_MIGRATION_DIR
          value: /tmp/migrations
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: cache
          mountPath: /home/litellm/.cache
        - name: npm-cache
          mountPath: /home/litellm/.npm
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: litellm-config
      - name: cache
        emptyDir: {}
      - name: npm-cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
