apiVersion: batch/v1
kind: CronJob
metadata:
  name: webscraper-yaencontre
  namespace: webscraper
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/arch: arm64
          restartPolicy: OnFailure
          containers:
            - name: webscraper
              image: ghcr.io/damianjsp/webscraper:latest
              imagePullPolicy: Always
              command: ["webscraper", "run", "--plugin", "yaencontre", "--sink", "jsonl", "--output", "/data/yaencontre"]
              env:
                - name: TELEGRAM_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: webscraper-secrets
                      key: TELEGRAM_BOT_TOKEN
                - name: TELEGRAM_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: webscraper-secrets
                      key: TELEGRAM_CHAT_ID
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: webscraper-data
