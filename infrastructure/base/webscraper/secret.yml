apiVersion: v1
kind: Secret
metadata:
  name: webscraper-secrets
  namespace: webscraper
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "REPLACE_WITH_REAL_VALUE"
  TELEGRAM_CHAT_ID: "REPLACE_WITH_REAL_VALUE"
