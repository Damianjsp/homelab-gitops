apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-web
  namespace: sure
  labels:
    app: sure
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure
      component: web
  template:
    metadata:
      labels:
        app: sure
        component: web
    spec:
      initContainers:
      - name: db-migrate
        image: ghcr.io/we-promise/sure:stable
        command: ["bin/rails", "db:prepare"]
        env:
        - name: RAILS_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sure-secrets
              key: DATABASE_URL
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: sure-secrets
              key: SECRET_KEY_BASE
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
      containers:
      - name: web
        image: ghcr.io/we-promise/sure:stable
        command: ["bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: RAILS_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sure-secrets
              key: DATABASE_URL
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: sure-secrets
              key: SECRET_KEY_BASE
        - name: REDIS_URL
          value: redis://redis.sure.svc.cluster.local:6379/0
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
        - name: RAILS_ASSUME_SSL
          value: "false"
        - name: WEB_CONCURRENCY
          value: "2"
        - name: RAILS_MAX_THREADS
          value: "5"
        - name: OPENAI_ACCESS_TOKEN
          value: "sk-homelab-ai-key"
        - name: OPENAI_URI_BASE
          value: "http://litellm-proxy.litellm.svc.cluster.local:4000/v1"
        - name: OPENAI_MODEL
          value: "gpt-5.2"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: storage
          mountPath: /rails/storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: sure-storage
# NOTE: patch below appended — AI config via LiteLLM
