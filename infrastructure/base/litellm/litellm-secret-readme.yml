# NOTE: litellm-secrets is NOT managed by GitOps (never commit secrets to git)
# Apply manually on the cluster:
#
# kubectl create secret generic litellm-secrets -n litellm \
#   --from-literal=AZURE_ANTHROPIC_API_KEY=<value> \
#   --from-literal=AZURE_EUROPE_API_KEY=<value> \
#   --from-literal=AZURE_AMERICA_API_KEY=<value> \
#   --from-literal=AZURE_SGF_API_KEY=<value> \
#   --from-literal=LITELLM_MASTER_KEY=<value> \
#   --from-literal=DATABASE_URL=<value> \
#   --from-literal=LITELLM_SALT_KEY=<value>
#
# Also apply ACR pull secret:
# kubectl create secret docker-registry acr-secret -n litellm \
#   --docker-server=dahomelab.azurecr.io \
#   --docker-username=<sp-client-id> \
#   --docker-password=<sp-client-secret>
