apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
    component: search-engine
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: searxng
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: searxng
        component: search-engine
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
        kubernetes.io/hostname: pi5-01
      securityContext:
        runAsNonRoot: false  # SearXNG needs root for uwsgi binding
        fsGroup: 977
      containers:
        - name: searxng
          image: searxng/searxng:2026.3.27-265858ee2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: SEARXNG_BASE_URL
              value: "http://searxng.searxng.svc.cluster.local:8080/"
            - name: TZ
              value: "Europe/Madrid"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
                - SETUID
                - SETGID
            readOnlyRootFilesystem: false
      volumes:
        - name: config
          configMap:
            name: searxng-settings
